---
# Examples Dashboard Data
# ─────────────────────────────────────────────────────────────────────────────
# Each entry is one card on the dashboard.
#
# Fields:
#   id          (integer)  Unique identifier. Increment from the last entry.
#   title       (string)   Short title shown on the card (~60 chars max).
#   description (string)   1–3 sentence description of the resource.
#   url         (string)   Full public URL to the example.
#   tools       (list)     One or more tool categories. Current options:
#                            - Lab Manual
#                            - Website
#                            - Reproducible Reports
#                            - Dashboards
#                            - Data Management
#                            - Project Management
#   keywords    (list)     One or more keywords. Current options:
#                            - visualizations
#                            - GitHub
#                            - python
#                            - r
#                            - cloud
#                            - template
#                            - tutorials
#   image       (string)   Either a bare filename (e.g. my-project.png) stored
#                          in content/card-images/, OR a full external URL
#                          (e.g. https://example.com/img.png). Leave blank ""
#                          to show the placeholder image.
#   author      (string)   Person or organisation who created it.
#   date_added  (string)   ISO date (YYYY-MM-DD). For internal tracking.
#
# To add a new entry: copy an existing block, paste at the bottom,
# increment the id, and fill in the fields. New tools/keywords you add
# here will automatically appear in the dashboard dropdowns on next render.
# ─────────────────────────────────────────────────────────────────────────────

